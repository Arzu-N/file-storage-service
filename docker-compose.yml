version: '3.8'

services:
  postgres:
     image: postgres:15
     container_name: storage-postgres
     restart: always
     environment:
       POSTGRES_DB: storage
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: postgres123
       TZ: Asia/Baku
     ports:
       - "5432:5432"
     networks:
       - storage-network

  minio:
     image: minio/minio
     container_name: storage-minio
     restart: always
     command: server /data  --console-address ":9001"
     environment:
       MINIO_ROOT_USER: minio
       MINIO_ROOT_PASSWORD: minio123
       TZ: Asia/Baku
     ports:
       - "9000:9000"
       - "9001:9001"
     networks:
       - storage-network

  app:
    build: .
    container_name: storage-app
    restart: always
    depends_on:
       - postgres
       - minio
    ports:
       - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/storage
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      ADMIN_SECRET: superStrongSecret123
      STORAGE_PROVIDER: minio
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      TZ: Asia/Baku
    networks:
        - storage-network

networks:
 storage-network:
   driver: bridge









